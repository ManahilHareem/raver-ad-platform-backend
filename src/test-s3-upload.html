<!DOCTYPE html>
<html>
<body>
    <h2>S3 PUT Upload Test</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload Video</button>
    <p id="status"></p>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const status = document.getElementById('status');
            
            if (!file) {
                alert("Please select a file first");
                return;
            }

            status.innerText = "1. Getting Upload URL...";
            
            try {
                // REPLACE THIS with your real token if testing locally
                const token = "YOUR_TOKEN_HERE"; 

                // 1. Request the URL from your API
                const response = await fetch('http://localhost:8000/api/assets/upload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        filename: file.name,
                        contentType: file.type,
                        fileSize: file.size
                    })
                });

                const { data } = await response.json();
                const uploadUrl = data.uploadUrl;
                status.innerText = "2. Uploading to S3 (PUT method)...";

                // 2. Perform the ACTUAL upload to S3 (MUST BE PUT)
                const uploadResponse = await fetch(uploadUrl, {
                    method: 'PUT',
                    body: file,
                    headers: {
                        'Content-Type': file.type
                    }
                });

                if (uploadResponse.ok) {
                    status.innerText = "SUCCESS! Video is now in S3. View it here: " + data.asset.url;
                } else {
                    const errorText = await uploadResponse.text();
                    status.innerText = "S3 ERROR: " + errorText;
                }

            } catch (err) {
                status.innerText = "FETCH ERROR: " + err.message;
            }
        }
    </script>
</body>
</html>
